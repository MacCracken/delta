# Delta Docker configuration
# Binds to 0.0.0.0 so the container port is reachable from the host/network

[server]
host = "0.0.0.0"
port = 8070
api_prefix = "/api/v1"
cors_origins = []

[storage]
repos_dir = "/var/lib/delta/repos"
artifacts_dir = "/var/lib/delta/artifacts"
db_url = "sqlite:///var/lib/delta/delta.db"

[auth]
enabled = true
token_expiry_secs = 86400
secrets_key = "change-me-to-a-strong-random-passphrase"
