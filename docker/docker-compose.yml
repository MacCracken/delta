services:
  delta-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: delta-server
    ports:
      - "8070:8070"
    volumes:
      - delta-repos:/var/lib/delta/repos
      - delta-artifacts:/var/lib/delta/artifacts
      - delta-data:/var/lib/delta/data
    environment:
      - RUST_LOG=info,delta=debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8070/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    profiles:
      - prod

  delta-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: delta-dev
    ports:
      - "8070:8070"
    volumes:
      - ..:/workspace
      - cargo-cache:/root/.cargo/registry
      - delta-repos:/var/lib/delta/repos
      - delta-artifacts:/var/lib/delta/artifacts
      - delta-data:/var/lib/delta
    environment:
      - RUST_LOG=debug
    profiles:
      - dev

volumes:
  delta-repos:
  delta-artifacts:
  delta-data:
  cargo-cache:
