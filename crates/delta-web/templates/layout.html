<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Delta{% endblock %}</title>
<style>
:root {
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-link: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
a { color: var(--text-link); text-decoration: none; }
a:hover { text-decoration: underline; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
header .container {
  display: flex;
  align-items: center;
  gap: 16px;
}
header .logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
header .logo:hover { text-decoration: none; }
header nav { display: flex; gap: 8px; }
header nav a {
  color: var(--text-muted);
  padding: 4px 12px;
  border-radius: var(--radius);
  font-size: 14px;
}
header nav a:hover {
  color: var(--text);
  background: var(--bg-tertiary);
  text-decoration: none;
}
header nav a.active {
  color: var(--text);
  background: var(--bg-tertiary);
}
.breadcrumb {
  padding: 16px 0;
  font-size: 14px;
  color: var(--text-muted);
}
.breadcrumb a { color: var(--text-link); }
.breadcrumb .sep { margin: 0 6px; color: var(--text-muted); }
main { padding: 0 0 48px; }
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.page-header h1 {
  font-size: 20px;
  font-weight: 600;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
}
.btn:hover { background: var(--border); text-decoration: none; }
.btn-primary {
  background: #238636;
  border-color: #2ea043;
}
.btn-primary:hover { background: #2ea043; }
table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  font-size: 14px;
}
th, td {
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  background: var(--bg-secondary);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-secondary); }
.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  font-size: 13px;
}
.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-passed .status-dot { background: var(--green); }
.status-failed .status-dot { background: var(--red); }
.status-running .status-dot { background: var(--yellow); animation: pulse 1.5s infinite; }
.status-queued .status-dot { background: var(--text-muted); }
.status-cancelled .status-dot { background: var(--text-muted); }
.status-passed { color: var(--green); }
.status-failed { color: var(--red); }
.status-running { color: var(--yellow); }
.status-queued { color: var(--text-muted); }
.status-cancelled { color: var(--text-muted); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.sha {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-link);
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
}
.time-ago { color: var(--text-muted); font-size: 13px; }
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
.empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-header h3 { font-size: 14px; font-weight: 600; }
.card-body { padding: 16px; }
.log-viewer {
  background: #010409;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  padding: 12px 16px;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 600px;
  overflow-y: auto;
  color: var(--text-muted);
}
.log-viewer .log-line { display: block; }
.log-viewer .line-num {
  display: inline-block;
  width: 3em;
  text-align: right;
  margin-right: 1em;
  color: #484f58;
  user-select: none;
}
.job-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.job-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.job-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.job-header:hover { background: var(--bg-tertiary); }
.job-header h3 {
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.job-body {
  border-top: 1px solid var(--border);
  padding: 16px;
}
.job-body.collapsed { display: none; }
.step-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.step-header:first-child { margin-top: 0; }
.exit-code {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}
.pipeline-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
  padding: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.meta-item { font-size: 14px; }
.meta-label {
  color: var(--text-muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.chevron {
  transition: transform 0.2s;
  color: var(--text-muted);
  font-size: 12px;
}
.chevron.open { transform: rotate(90deg); }
.ws-status {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.ws-connected { background: #0d301d; color: var(--green); }
.ws-disconnected { background: #300d0d; color: var(--red); }
.ws-connecting { background: #302a0d; color: var(--yellow); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<header>
  <div class="container">
    <a href="/" class="logo">Delta</a>
    {% block nav %}{% endblock %}
  </div>
</header>
<div class="container">
  {% block breadcrumb %}{% endblock %}
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
